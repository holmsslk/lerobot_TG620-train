[package]
name = "robot_interfaces"
version = "0.0.0"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
rcl_interfaces = "*"
builtin_interfaces = "*"
sensor_msgs = "*"
geometry_msgs = "*"
trajectory_msgs = "*"
std_msgs = "*"
tf2_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'rcl_interfaces/serde', 'builtin_interfaces/serde', 'sensor_msgs/serde', 'geometry_msgs/serde', 'trajectory_msgs/serde', 'std_msgs/serde', 'tf2_msgs/serde']

[package.metadata.rclrs]
reexport = true
